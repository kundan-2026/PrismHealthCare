<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Admin | Prism Healthcare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            margin: 0;
            overflow-x: hidden;
        }
        
        /* THE LOGO IMAGE BACKGROUND (40% Transparency) */
        .bg-logo-image {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 550px;
            opacity: 0.4;
            z-index: -1;
            pointer-events: none;
        }

        /* GLASS EFFECT FOR CARDS */
        .glass-card {
            background: rgba(255, 255, 255, 0.75) !important;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .hidden-section { display: none; }
        
        .calendar-grid { 
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; 
            background: #e2e8f0; border-radius: 1.5rem; overflow: hidden; 
        }
        .calendar-day { background: rgba(255, 255, 255, 0.85); min-height: 100px; padding: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="text-slate-900 min-h-screen">

    <!-- THE LOGO IMAGE -->
    <img src="Prism logo.jpeg" class="bg-logo-image" alt="Prism Logo Background">

    <!-- LOGIN SCREEN -->
    <div id="login-overlay" class="fixed inset-0 bg-slate-900/95 backdrop-blur-xl z-[500] flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl max-w-sm w-full text-center animate-fade">
            <div class="w-20 h-20 bg-slate-900 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl">
                <i data-lucide="lock" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-2xl font-black mb-1 tracking-tight">Staff Portal</h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-8">Access Required</p>
            <input type="password" id="adminPass" placeholder="Enter Password" class="w-full px-6 py-4 bg-slate-50 border rounded-2xl mb-4 outline-none focus:ring-4 focus:ring-slate-900/5 transition-all text-center font-bold">
            <button onclick="attemptLogin()" id="loginBtn" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition-all shadow-xl">Login</button>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="main-dashboard" class="hidden-section">
        <nav class="bg-white/70 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50 h-20 flex items-center">
            <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <img src="Prism logo.jpeg" class="w-10 h-10 rounded-xl" alt="Logo">
                    <span class="text-xl font-black tracking-tighter uppercase italic">Prism Admin</span>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="loadAdminData()" class="p-2.5 bg-white border rounded-xl shadow-sm hover:bg-slate-50 transition-colors"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
                    <button onclick="location.reload()" class="text-red-500 font-bold text-xs px-4 py-2 hover:bg-red-50 rounded-xl transition-all">LOGOUT</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 lg:p-10">
            
            <!-- Statistics -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                <div class="glass-card p-8 rounded-[2.5rem] shadow-sm">
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1">Total Bookings</p>
                    <h3 id="stat-total" class="text-4xl font-black text-slate-900">0</h3>
                </div>
                <div class="glass-card p-8 rounded-[2.5rem] shadow-sm">
                    <p class="text-emerald-500 text-[10px] font-bold uppercase tracking-widest mb-1">Collections</p>
                    <h3 id="stat-revenue" class="text-4xl font-black text-slate-900">₹0</h3>
                </div>
                <div class="bg-slate-900/90 backdrop-blur-sm text-white p-8 rounded-[3rem] md:col-span-2 relative overflow-hidden flex flex-col justify-center border border-slate-800 shadow-xl">
                    <div class="z-10">
                        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-1 italic">Last Patient Booked</p>
                        <h3 id="last-booking-name" class="text-2xl font-bold">...</h3>
                        <p id="last-booking-info" class="text-sm text-slate-400 font-medium opacity-80 mt-1"></p>
                    </div>
                    <i data-lucide="zap" class="absolute right-[-10px] bottom-[-10px] w-32 h-32 text-white/5 -rotate-12"></i>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex flex-col lg:flex-row justify-between items-center gap-4 mb-8">
                <div class="flex flex-wrap gap-4 w-full lg:w-auto">
                    <div class="relative flex-1 lg:w-80">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="adminSearch" onkeyup="filterTable()" placeholder="Search patient name..." class="w-full pl-12 pr-4 py-4 glass-card border-none rounded-2xl outline-none focus:ring-4 focus:ring-slate-900/5 shadow-sm text-sm font-medium">
                    </div>
                    <div class="glass-card p-2 rounded-2xl shadow-sm flex items-center gap-2">
                        <input type="date" id="dayFilter" onchange="filterByDay()" class="outline-none text-xs font-bold px-3 py-1 text-slate-700 bg-transparent cursor-pointer">
                        <button onclick="clearFilter()" class="text-red-500 p-1.5 hover:bg-red-50 rounded-lg transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
                    </div>
                </div>

                <div class="flex bg-slate-200/50 p-1 rounded-2xl backdrop-blur-md">
                    <button id="btn-table" onclick="toggleView('table')" class="px-8 py-2.5 rounded-xl text-xs font-bold transition-all bg-white text-slate-900 shadow-sm">Records List</button>
                    <button id="btn-calendar" onclick="toggleView('calendar')" class="px-8 py-2.5 rounded-xl text-xs font-bold transition-all text-slate-500">Calendar</button>
                </div>
            </div>

            <!-- TABLE VIEW -->
            <div id="table-view" class="glass-card rounded-[3rem] shadow-xl overflow-hidden animate-fade">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-900/5 text-[10px] uppercase font-black text-slate-500 tracking-[0.15em]">
                                <th class="p-6">Sl No.</th>
                                <th class="p-6">Patient Name & Contact</th>
                                <th class="p-6">Case Detail</th>
                                <th class="p-6">Payment Reference</th>
                                <th class="p-6 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-slate-100 text-sm">
                            <!-- JS Rows -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- CALENDAR VIEW -->
            <div id="calendar-view" class="hidden-section glass-card rounded-[3rem] shadow-xl p-8 animate-fade">
                <div class="calendar-grid" id="calendar-grid"></div>
            </div>

        </main>
    </div>

    <script>
        lucide.createIcons();
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyWUmQYSn3zsPX0TsxPEXQV5l314OirxscWt1fL1MS8uFdAHNNLSNO4XFZMvMo2PV9-/exec';
        let globalData = [];

        async function attemptLogin() {
            const pass = document.getElementById('adminPass').value;
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "adminLogin", password: pass }) });
            if (await res.text() === "SUCCESS") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'block';
                loadAdminData();
            } else { alert("❌ Unauthorized access."); }
        }

        async function loadAdminData() {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "fetchAdminData" }) });
            globalData = await res.json();
            
            document.getElementById('stat-total').innerText = globalData.length;
            document.getElementById('stat-revenue').innerText = "₹" + (globalData.length * 500).toLocaleString();

            const latest = globalData[globalData.length - 1];
            if(latest) {
                document.getElementById('last-booking-name').innerText = latest[2];
                document.getElementById('last-booking-info').innerText = `${latest[8]} | Slot: ${latest[9]}`;
            }

            renderTable([...globalData].reverse());
            renderCalendar(globalData);
        }

        function renderTable(data) {
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = "";
            data.forEach((row, index) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-white/60 transition-colors group">
                        <td class="p-6">
                            <span class="bg-slate-900 text-white text-[10px] font-black px-3 py-1.5 rounded-lg shadow-sm">
                                ${index + 1}
                            </span>
                        </td>
                        <td class="p-6">
                            <!-- PATIENT NAME IS BOLDED -->
                            <p class="font-black text-slate-900 text-base mb-0.5">${row[2]}</p>
                            <p class="text-xs text-slate-500 font-medium flex items-center gap-1">
                                <i data-lucide="phone" class="w-3 h-3"></i> ${row[3]}
                            </p>
                        </td>
                        <td class="p-6">
                            <p class="font-semibold text-slate-600 line-clamp-1 italic mb-1">"${row[6]}"</p>
                            <span class="text-[9px] text-blue-600 bg-blue-50 px-2 py-0.5 rounded font-black tracking-widest uppercase border border-blue-100">${row[4]}</span>
                        </td>
                        <td class="p-6">
                            <span class="font-mono text-[10px] text-red-500 font-bold bg-red-50/50 px-3 py-1.5 rounded-xl border border-red-100">${row[7]}</span>
                        </td>
                        <td class="p-6">
                            <div class="flex gap-2 justify-center">
                                <button onclick="sendWA('${row[3]}', '${row[2]}', '${row[8]}', '${row[9]}')" class="bg-emerald-500 text-white p-3 rounded-2xl hover:scale-110 hover:shadow-lg hover:shadow-emerald-200 transition-all">
                                    <i data-lucide="message-square" class="w-4 h-4"></i>
                                </button>
                                <button onclick="deleteRow('${row[0]}')" class="bg-white border text-slate-300 p-3 rounded-2xl hover:bg-red-50 hover:text-red-500 hover:border-red-100 transition-all">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            lucide.createIcons();
        }

        function renderCalendar(data) {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = "";
            const now = new Date();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const daily = data.filter(r => r[8] === dateStr);
                const dayDiv = document.createElement('div');
                dayDiv.className = `calendar-day ${i === now.getDate() ? 'bg-blue-50 ring-1 ring-blue-200' : ''}`;
                dayDiv.innerHTML = `
                    <div class="flex justify-between mb-1">
                        <span class="text-xs font-black ${daily.length > 0 ? 'text-slate-900' : 'text-slate-300'}">${i}</span>
                        ${daily.length > 0 ? `<span class="bg-slate-900 text-white text-[8px] font-black px-1.5 rounded-full">${daily.length}</span>` : ''}
                    </div>
                    ${daily.slice(0, 2).map(a => `<div class="bg-white/60 text-[8px] p-1 rounded mb-1 truncate font-bold text-slate-600 border shadow-sm">${a[2]}</div>`).join('')}
                `;
                grid.appendChild(dayDiv);
            }
        }

        function filterByDay() {
            const val = document.getElementById('dayFilter').value;
            renderTable(val ? globalData.filter(r => r[8] === val).reverse() : [...globalData].reverse());
        }

        function clearFilter() { document.getElementById('dayFilter').value = ""; renderTable([...globalData].reverse()); }

        function filterTable() {
            const term = document.getElementById('adminSearch').value.toUpperCase();
            document.querySelectorAll('#admin-table-body tr').forEach(r => r.style.display = r.innerText.toUpperCase().includes(term) ? '' : 'none');
        }

        function toggleView(v) {
            const isTable = v === 'table';
            document.getElementById('table-view').style.display = isTable ? 'block' : 'none';
            document.getElementById('calendar-view').style.display = isTable ? 'none' : 'block';
            document.getElementById('btn-table').className = isTable ? 'px-8 py-2.5 rounded-xl text-xs font-bold transition-all bg-white text-slate-900 shadow-sm' : 'px-8 py-2.5 rounded-xl text-xs font-bold transition-all text-slate-500';
            document.getElementById('btn-calendar').className = !isTable ? 'px-8 py-2.5 rounded-xl text-xs font-bold transition-all bg-white text-slate-900 shadow-sm' : 'px-8 py-2.5 rounded-xl text-xs font-bold transition-all text-slate-500';
        }

        function sendWA(phone, name, date, time) {
            const msg = `*Prism Healthcare Confirmation*\nHi ${name}, your session is booked for *${date}* at *${time}*.`;
            window.open(`https://wa.me/91${phone.replace(/\D/g, '')}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        async function deleteRow(id) {
            if(!confirm("⚠️ Delete record permanently?")) return;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "deleteAppointment", id: id }) });
            loadAdminData();
        }
    </script>
</body>
</html>
